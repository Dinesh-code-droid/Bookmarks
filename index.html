<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bookmark Diary</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- [ALL STYLES REMAIN EXACTLY SAME - NO CHANGES] -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      padding: 10px;
      background: linear-gradient(135deg, #FFFFFF, #F7FFFD, #FFFFFF);
      background-size: 600% 600%;
      animation: gradientBG 10s ease infinite;
      color: #222;
      min-height: 100vh;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #00002F;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
    }
    .input-group { margin-bottom: 12px; }
    input[type="text"] {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      margin-bottom: 14px; font-size: 16px; background: #fff;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .button-group {
      display: flex; overflow-x: auto; gap: 10px;
      padding-bottom: 14px; margin-bottom: 20px;
    }
    .button-group button {
      flex: 0 0 auto; padding: 12px 18px; font-size: 16px;
      border: none; border-radius: 50px; color: #fff;
      transition: transform 0.2s;
      box-shadow: 0 3px 6px rgba(0,0,0,0.2);
    }
    .button-group button:hover { transform: scale(1.05); }
    button:nth-child(1) { background: #ff3c38; }
    button:nth-child(2) { background: #ffa534; }
    button:nth-child(3) { background: #17c3b2; }
    button:nth-child(4) { background: #3d5af1; }
    button:nth-child(5) { background: #8338ec; }

    #bookdiv {
     display: flex;
     //justify-content: center;
      border: 1px solid #ddd;
     border-radius: 2px;
      background: rgba(255,255,255,0.8);
      
    }
    .bookmark-column {
      flex: 1;
    }
    .bookmark {
      text-align:center;
      background: #ffffffee;
      margin: 3px 3px;
      width:95%;
       height:50px;
      border-left: 4px solid #17c3b2;
      border-radius: 10px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.15);
      transition: transform 0.2s;
      position: relative;
    }
    .bookmark:hover { transform: scale(1.015); }
  
    .bookmark strong {
      font-size: 15px;
      display: block;
      padding-top: 10px;
      color: #111;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bookmark small {
      display: block;
      color: #666;
      font-size: 12px;
    }
    .bookmark a {
      color: #3d5af1;
      text-decoration: none;
      display: block;
      margin-top: 8px;
      font-size: 14px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bookmark a:hover { text-decoration: underline; }
    .bookmark .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #f51720;
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      display: none;
    }
    .bookmark .delete-btn:hover { background: #d1131a; }

    @media (max-width: 500px) {
      #bookdiv { flex-direction:row; }
      .bookmark-column { max-width: 50%; margin: 10px 0; }
      .button-group button { padding: 10px 14px; font-size: 14px; }
    }

    #searchBox {
      padding: 10px 20px;
      width: 280px;
      border-radius: 50px;
      border: 1px solid #ccc;
      font-size: 18px;
    }
    #buttons {
      padding: 10px 20px;
      font-size: 18px;
      background: #FF3D00;
      color: white;
      border: none;
      border-radius: 50px;
      margin-left: 10px;
      width: 90px;
    }
    #buttons:hover { background: #45a049; }
  </style>
</head>

<body>
<h2>Bookmark Diary</h2>
  
<input type="text" id="searchBox" placeholder="google search...." onkeydown="if(event.key==='Enter') searchGoogle()">
<button id="buttons" onclick="searchGoogle()">Search</button>
<br><hr><hr><br>

<div id="bookdiv">
  <div class="bookmark-column" id="bookmarkList1"></div>
  <div class="bookmark-column" id="bookmarkList2"></div>
</div>

<br><hr><hr><br>

<div class="input-group">
  <input type="text" id="shortName" placeholder="Short Name" oninput="capitalizeshortName()">
  <input type="text" id="webURL" placeholder="Web URL (https://...)">
</div>

<div class="button-group">
  <button onclick="addnsave()">Add</button>
  <button onclick="toggleDeleteButtons()">Edit</button>
  <button onclick="document.getElementById('importFile').click()">Import</button>
  <button onclick="exportBookmarks()">Export</button>
  <button onclick="window.print()">Print</button>
</div>

<input type="file" id="importFile" accept=".txt" onchange="importBookmarks()" style="display:none;">

<script>
  
  function capitalizeshortName() {
    const input = document.getElementById('shortName');
    const value = input.value.toLowerCase()
        .split(' ')
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(' ');
    input.value = value;
}
  
  
  let bookmarks = [];

  // FIXED: Correct day calculation using proper date normalization
  function getDaysAgo(dateStr) {
    if (dateStr === "Never" || !dateStr) return "Never";
    
    const lastOpened = new Date(dateStr);
    if (isNaN(lastOpened.getTime())) return "Never";
    
    const now = new Date();
    // Normalize both dates to midnight to avoid time-of-day issues
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
    const bookmarkDate = new Date(lastOpened.getFullYear(), lastOpened.getMonth(), lastOpened.getDate(), 0, 0, 0);
    
    const diffTime = today.getTime() - bookmarkDate.getTime();
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
    
    if (diffDays <= 0) return "today";
    if (diffDays === 1) return "1 day ago";
    
    return `${diffDays} days ago`;
  }

  function searchGoogle() {
    var query = document.getElementById('searchBox').value;
    if (query.trim() !== "") {
      window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(query);
    } else {
      alert("Please enter a search term.");
    }
  }

  function addBookmark() {
    const name = document.getElementById('shortName').value.trim();
    const url = document.getElementById('webURL').value.trim();
    if (!name || !url) {
      alert('Please fill both fields.');
      return;
    }
    bookmarks.push({ name, url, dateTime: new Date().toISOString(), lastOpened: "Never" });
    displayBookmarks();
    document.getElementById('shortName').value = '';
    document.getElementById('webURL').value = '';
  }

  function displayBookmarks() {
    const list1 = document.getElementById('bookmarkList1');
    const list2 = document.getElementById('bookmarkList2');
    list1.innerHTML = '';
    list2.innerHTML = '';
    
    bookmarks.forEach((bm, index) => {
      const div = document.createElement('div');
      div.className = 'bookmark';
      div.innerHTML = `
        <strong>${bm.name}</strong>
        <small>${getDaysAgo(bm.lastOpened)}</small>
        <button class="delete-btn" onclick="deleteBookmark(${index}); event.stopPropagation();">Delete</button>
      `;
      
      div.addEventListener('click', (e) => {
        if (!e.target.classList.contains('delete-btn')) {
          openBookmark(index);
        }
      });
      
      if (index % 2 === 0) {
        list1.appendChild(div);
      } else {
        list2.appendChild(div);
      }
    });
  }

  function addnsave() {
    addBookmark();
    saveBookmarks();
  }

  function saveBookmarks() {
    localStorage.setItem('myBookmarks', JSON.stringify(bookmarks));
  }

  function openBookmark(index) {
    const bm = bookmarks[index];
    bookmarks[index].lastOpened = new Date().toISOString();
    saveBookmarks();
    displayBookmarks();
    window.open(bm.url, '_blank');
  }

  function exportBookmarks() {
    const data = JSON.stringify(bookmarks, null, 2);
    const blob = new Blob([data], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'bookmarks.txt';
    a.click();
  }

  function importBookmarks() {
    const fileInput = document.getElementById('importFile');
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const imported = JSON.parse(e.target.result);
        if (Array.isArray(imported)) {
          // Fix dates during import
          const fixedBookmarks = imported.map(bm => ({
            name: bm.name || '',
            url: bm.url || '',
            dateTime: bm.dateTime || '',
            lastOpened: (bm.lastOpened && !isNaN(new Date(bm.lastOpened).getTime())) ? bm.lastOpened : "Never"
          }));
          bookmarks = bookmarks.concat(fixedBookmarks);
          saveBookmarks();
          displayBookmarks();
        } else {
          alert('Invalid file format.');
        }
      } catch (err) {
        alert('Error reading file.');
      }
    };
    reader.readAsText(file);
  }

  function deleteBookmark(index) {
    bookmarks.splice(index, 1);
    saveBookmarks();
    displayBookmarks();
    toggleDeleteButtons();
  }

  function toggleDeleteButtons() {
    const btns = document.querySelectorAll('.delete-btn');
    btns.forEach(btn => {
      btn.style.display = (btn.style.display === 'block') ? 'none' : 'block';
    });
  }

  function loadBookmarks() {
    const stored = localStorage.getItem('myBookmarks');
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        // Fix corrupted dates during load
        bookmarks = parsed.map(bm => ({
          name: bm.name || '',
          url: bm.url || '',
          dateTime: bm.dateTime || '',
          lastOpened: (bm.lastOpened && !isNaN(new Date(bm.lastOpened).getTime())) ? bm.lastOpened : "Never"
        }));
      } catch(e) {
        bookmarks = [];
      }
      displayBookmarks();
    }
  }

  document.getElementById('webURL').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      addBookmark();
    }
  });

  loadBookmarks();
</script>

</body>
</html>
