<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bookmark Diary</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      padding: 10px;
      background: linear-gradient(135deg, #FFFFFF, #F7FFFD, #FFFFFF);
      background-size: 600% 600%;
      animation: gradientBG 10s ease infinite;
      color: #222;
      min-height: 100vh;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #00002F;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
    }
    .input-group { margin-bottom: 12px; }
    input[type="text"] {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      margin-bottom: 14px; font-size: 16px; background: #fff;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .button-group {
      display: flex; overflow-x: auto; gap: 10px;
      padding-bottom: 14px; margin-bottom: 20px;
    }
    .button-group button {
      flex: 0 0 auto; padding: 12px 18px; font-size: 16px;
      border: none; border-radius: 50px; color: #fff;
      transition: transform 0.2s;
      box-shadow: 0 3px 6px rgba(0,0,0,0.2);
      cursor: pointer;
    }
    .button-group button:hover { transform: scale(1.05); }
    .button-group button:nth-child(1) { background: #ff3c38; }
    .button-group button:nth-child(2) { background: #ffa534; }
    .button-group button:nth-child(3) { background: #17c3b2; }
    .button-group button:nth-child(4) { background: #3d5af1; }
    .button-group button:nth-child(5) { background: #8338ec; }

    #bookdiv {
      display: flex;
      border: 1px solid #ddd;
      border-radius: 2px;
      background: rgba(255,255,255,0.8);
    }
    .bookmark-column {
      flex: 1;
    }

    /* ── Drag & Drop styles ── */
    .bookmark {
      text-align: center;
      background: #ffffffee;
      margin: 3px 3px;
      width: 95%;
      height: 50px;
      border-left: 4px solid #17c3b2;
      border-radius: 10px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.15);
      transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
      position: relative;
      cursor: grab;
      user-select: none;
    }
    .bookmark:active { cursor: grabbing; }
    .bookmark:hover { transform: scale(1.015); }

    /* Item being dragged */
    .bookmark.dragging {
      opacity: 0.4;
      transform: scale(1.03);
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    /* Drop indicator line between items */
    .drop-indicator {
      height: 3px;
      background: #17c3b2;
      border-radius: 2px;
      margin: 0 3px;
      display: none;
    }
    .drop-indicator.active { display: block; }

    .bookmark strong {
      font-size: 15px;
      display: block;
      padding-top: 10px;
      color: #111;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bookmark small {
      display: block;
      color: #666;
      font-size: 12px;
    }
    .bookmark a {
      color: #3d5af1;
      text-decoration: none;
      display: block;
      margin-top: 8px;
      font-size: 14px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bookmark a:hover { text-decoration: underline; }
    .bookmark .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #f51720;
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      display: none;
      cursor: pointer;
    }
    .bookmark .delete-btn:hover { background: #d1131a; }

    @media (max-width: 500px) {
      #bookdiv { flex-direction: row; }
      .bookmark-column { max-width: 50%; margin: 10px 0; }
      .button-group button { padding: 10px 14px; font-size: 14px; }
    }

    #searchBox {
      padding: 10px 20px;
      width: 280px;
      border-radius: 50px;
      border: 1px solid #ccc;
      font-size: 18px;
    }
    #buttons {
      padding: 10px 20px;
      font-size: 18px;
      background: #FF3D00;
      color: white;
      border: none;
      border-radius: 50px;
      margin-left: 10px;
      width: 90px;
      cursor: pointer;
    }
    #buttons:hover { background: #45a049; }

    /* Drag hint badge */
    #dragHint {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 4px;
    }
  </style>
</head>

<body>
<h2>Bookmark Diary</h2>

<input type="text" id="searchBox" placeholder="google search...." onkeydown="if(event.key==='Enter') searchGoogle()">
<button id="buttons" onclick="searchGoogle()">Search</button>
<br><hr><hr><br>

<p id="dragHint">☰ Drag bookmarks to reorder</p>

<div id="bookdiv">
  <div class="bookmark-column" id="bookmarkList1"></div>
  <div class="bookmark-column" id="bookmarkList2"></div>
</div>

<br><hr><hr><br>

<div class="input-group">
  <input type="text" id="shortName" placeholder="Short Name">
  <input type="text" id="webURL" placeholder="Web URL (https://...)">
</div>

<div class="button-group">
  <button onclick="addnsave()">Add</button>
  <button onclick="toggleDeleteButtons()">Edit</button>
  <button onclick="document.getElementById('importFile').click()">Import</button>
  <button onclick="exportBookmarks()">Export</button>
  <button onclick="window.print()">Print</button>
</div>

<input type="file" id="importFile" accept=".txt" onchange="importBookmarks()" style="display:none;">

<script>
  let bookmarks = [];
  let dragSrcIndex = null;   // index in bookmarks[] of item being dragged
  let isEditMode = false;

  // ── Date helper ──
  function getDaysAgo(dateStr) {
    if (dateStr === "Never" || !dateStr) return "Never";
    const lastOpened = new Date(dateStr);
    if (isNaN(lastOpened.getTime())) return "Never";
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const bookmarkDate = new Date(lastOpened.getFullYear(), lastOpened.getMonth(), lastOpened.getDate());
    const diffDays = Math.floor((today - bookmarkDate) / 86400000);
    if (diffDays <= 0) return "today";
    if (diffDays === 1) return "1 day ago";
    return `${diffDays} days ago`;
  }

  // ── Search ──
  function searchGoogle() {
    const query = document.getElementById('searchBox').value;
    if (query.trim()) {
      window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(query);
    } else {
      alert("Please enter a search term.");
    }
  }

  // ── Add ──
  function addBookmark() {
    const name = document.getElementById('shortName').value.trim();
    const url  = document.getElementById('webURL').value.trim();
    if (!name || !url) { alert('Please fill both fields.'); return; }
    bookmarks.push({ name, url, dateTime: new Date().toLocaleString(), lastOpened: "Never" });
    displayBookmarks();
    document.getElementById('shortName').value = '';
    document.getElementById('webURL').value = '';
  }

  // ── Display (with drag-and-drop wiring) ──
  function displayBookmarks() {
    const list1 = document.getElementById('bookmarkList1');
    const list2 = document.getElementById('bookmarkList2');
    list1.innerHTML = '';
    list2.innerHTML = '';

    bookmarks.forEach((bm, index) => {
      const div = document.createElement('div');
      div.className = 'bookmark';
      div.draggable = true;
      div.dataset.index = index;

      div.innerHTML = `
        <strong>${bm.name}</strong>
        <small>${getDaysAgo(bm.lastOpened)}</small>
        <button class="delete-btn" onclick="deleteBookmark(${index}); event.stopPropagation();">Delete</button>
      `;

      // show delete buttons if edit mode is on
      if (isEditMode) {
        div.querySelector('.delete-btn').style.display = 'block';
      }

      // ── open on click (not drag) ──
      div.addEventListener('click', (e) => {
        if (!e.target.classList.contains('delete-btn')) openBookmark(index);
      });

      // ── drag events ──
      div.addEventListener('dragstart', onDragStart);
      div.addEventListener('dragend',   onDragEnd);
      div.addEventListener('dragover',  onDragOver);
      div.addEventListener('dragleave', onDragLeave);
      div.addEventListener('drop',      onDrop);

      if (index % 2 === 0) list1.appendChild(div);
      else                  list2.appendChild(div);
    });
  }

  // ── Drag handlers — SWAP only ──
  function onDragStart(e) {
    dragSrcIndex = parseInt(this.dataset.index);
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragSrcIndex);
  }

  function onDragEnd(e) {
    document.querySelectorAll('.bookmark').forEach(el => {
      el.classList.remove('dragging');
      el.style.outline = '';
    });
  }

  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    this.style.outline = '2px dashed #17c3b2';
  }

  function onDragLeave(e) {
    this.style.outline = '';
  }

  function onDrop(e) {
    e.preventDefault();
    this.style.outline = '';

    const targetIndex = parseInt(this.dataset.index);
    if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;

    // ── Simple swap — only these two positions exchange ──
    const temp = bookmarks[dragSrcIndex];
    bookmarks[dragSrcIndex] = bookmarks[targetIndex];
    bookmarks[targetIndex]  = temp;

    dragSrcIndex = null;

    saveBookmarks();
    displayBookmarks();

    if (isEditMode) {
      document.querySelectorAll('.delete-btn').forEach(b => b.style.display = 'block');
    }
  }

  // ── CRUD & storage ──
  function addnsave()      { addBookmark(); saveBookmarks(); }
  function saveBookmarks() { localStorage.setItem('myBookmarks', JSON.stringify(bookmarks)); }

  function openBookmark(index) {
    bookmarks[index].lastOpened = new Date().toLocaleString();
    saveBookmarks();
    displayBookmarks();
    window.open(bookmarks[index].url, '_blank');
  }

  function deleteBookmark(index) {
    bookmarks.splice(index, 1);
    saveBookmarks();
    isEditMode = false;
    displayBookmarks();
  }

  function toggleDeleteButtons() {
    isEditMode = !isEditMode;
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.style.display = isEditMode ? 'block' : 'none';
    });
  }

  function exportBookmarks() {
    const blob = new Blob([JSON.stringify(bookmarks, null, 2)], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'bookmarks.txt';
    a.click();
  }

  function importBookmarks() {
    const file = document.getElementById('importFile').files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const imported = JSON.parse(e.target.result);
        if (Array.isArray(imported)) {
          bookmarks = bookmarks.concat(imported);
          saveBookmarks();
          displayBookmarks();
        } else { alert('Invalid file format.'); }
      } catch { alert('Error reading file.'); }
    };
    reader.readAsText(file);
  }

  function loadBookmarks() {
    const stored = localStorage.getItem('myBookmarks');
    if (stored) {
      try {
        bookmarks = JSON.parse(stored).map(bm => ({
          name:       bm.name       || '',
          url:        bm.url        || '',
          dateTime:   bm.dateTime   || '',
          lastOpened: (bm.lastOpened && !isNaN(new Date(bm.lastOpened).getTime()))
                      ? bm.lastOpened : "Never"
        }));
      } catch { bookmarks = []; }
      displayBookmarks();
    }
  }

  document.getElementById('webURL').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') addBookmark();
  });

  loadBookmarks();
</script>

</body>
</html>
